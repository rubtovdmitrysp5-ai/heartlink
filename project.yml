name: HeartLink
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
targets:
  HeartLink:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HeartLink/App
      - path: HeartLink/Models
      - path: HeartLink/ViewModels
      - path: HeartLink/Services
      - path: HeartLink/Views
    resources:
      - path: HeartLink/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.heartlink
        INFOPLIST_FILE: HeartLink/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeartLink/Resources/HeartLink.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - target: HeartLinkWidgets
  HeartLinkWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HeartLinkWidgets
        excludes:
          - Resources
    resources:
      - path: HeartLinkWidgets/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.heartlink.widgets
        INFOPLIST_FILE: HeartLinkWidgets/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeartLinkWidgets/Resources/HeartLinkWidgets.entitlements
        SKIP_INSTALL: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
