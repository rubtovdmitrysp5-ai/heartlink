name: iOS IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned device app
        run: |
          set -euo pipefail
          rm -rf build
          xcodebuild \
            -project HeartLink.xcodeproj \
            -scheme HeartLink \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee xcodebuild-ipa.log

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 2 -name 'HeartLink.app' -type d | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "HeartLink.app was not found."
            find build/DerivedData/Build/Products -maxdepth 4 -type d -name "*.app" -print
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.example.heartlink" "$APP_PATH/Info.plist" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.example.heartlink" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist"

          rm -rf "$APP_PATH/PlugIns"
          find "$APP_PATH" -name "_CodeSignature" -type d -prune -exec rm -rf {} +
          find "$APP_PATH" -name "embedded.mobileprovision" -type f -delete

          rm -rf build/Payload build/HeartLink-unsigned.ipa
          mkdir -p build/Payload
          ditto "$APP_PATH" build/Payload/HeartLink.app
          (cd build && /usr/bin/zip -qry HeartLink-unsigned.ipa Payload)
          /usr/bin/du -h build/HeartLink-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: HeartLink-unsigned-ipa
          path: build/HeartLink-unsigned.ipa
          retention-days: 14

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-ipa-log
          path: xcodebuild-ipa.log
          retention-days: 14
